<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magix Sales CRM</title>
<style>
  :root{
    --navy:#151b2e;
    --navy-2:#1f2740;
    --panel:#ffffff;
    --bg:#f3f4f8;
    --ink:#151b2e;
    --muted:#6b7280;
    --line:#e6e8f0;
    --accent:#3654ff;
    --accent-soft:#eaedff;
    --hot:#ef4444;
    --warm:#f59e0b;
    --cold:#3b82f6;
    --win:#10b981;
    --lost:#9ca3af;
    --radius:12px;
    font-family:'Segoe UI',Inter,system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);}
  h1,h2,h3,h4{margin:0;font-family:'Segoe UI',Inter,system-ui,sans-serif;letter-spacing:-0.01em;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* Layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--navy);color:#cdd3e6;flex-shrink:0;display:flex;flex-direction:column;padding:18px 12px;}
  .brand{color:#fff;font-weight:700;font-size:17px;padding:6px 10px 20px;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;color:#aeb5cc;margin-bottom:2px;transition:.15s;}
  .nav-item:hover{background:#232c48;color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-icon{width:18px;text-align:center;}
  .sidebar-foot{margin-top:auto;font-size:11px;color:#6a7291;padding:10px;}

  .main{flex:1;min-width:0;padding:22px 28px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .topbar h1{font-size:22px;}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:2px;}
  .btn{border:none;background:var(--accent);color:#fff;padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .btn.ghost{background:transparent;color:var(--accent);padding:6px 8px;}
  .btn.small{padding:6px 11px;font-size:12.5px;}
  .btn.danger{background:#fff;color:var(--hot);border:1px solid #fbd5d5;}

  /* Dashboard cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .card.clickable-card{cursor:pointer;transition:.15s;}
  .card.clickable-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(54,84,255,.10);transform:translateY(-1px);}
  .stat-num{font-size:26px;font-weight:700;}
  .stat-label{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .panel-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}

  .list-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .list-row:last-child{border-bottom:none;}
  .pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
  .pill.hot{background:#fee2e2;color:var(--hot);}
  .pill.warm{background:#fef3c7;color:#b45309;}
  .pill.cold{background:#dbeafe;color:#1d4ed8;}
  .pill.won{background:#d1fae5;color:#047857;}
  .pill.lost{background:#f3f4f6;color:#6b7280;}

  .alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px 14px;font-size:13px;color:#9a3412;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .alert.danger{background:#fef2f2;border-color:#fecaca;color:#991b1b;}

  /* Kanban */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;}
  .kcol{background:#eceef5;border-radius:12px;min-width:250px;max-width:250px;padding:10px;flex-shrink:0;}
  .kcol-head{font-size:12.5px;font-weight:700;color:#4b5063;display:flex;justify-content:space-between;margin-bottom:8px;padding:0 3px;}
  .kcard{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(20,20,40,.06);cursor:pointer;border:1px solid var(--line);}
  .kcard[draggable="true"]{cursor:grab;}
  .kcard[draggable="true"]:active{cursor:grabbing;}
  .kcard.dragging{opacity:.4;}
  .kcard:hover{border-color:var(--accent);}
  .kcard .name{font-weight:600;font-size:13.5px;margin-bottom:3px;}
  .kcard .meta{font-size:11.5px;color:var(--muted);}
  .kcol.dragover{outline:2px dashed var(--accent);outline-offset:-4px;}

  /* Table */
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--radius);overflow:hidden;}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line);background:#fafbfd;}
  td{padding:10px 12px;font-size:13.5px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  tr.clickable:hover{background:#f7f8fd;cursor:pointer;}

  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .toolbar input,.toolbar select{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .toolbar input[type=text]{min-width:220px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,18,32,.55);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:100;}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:640px;padding:24px 26px;margin-bottom:40px;}
  .modal.wide{max-width:820px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-head h2{font-size:18px;}
  .close-x{background:none;border:none;font-size:20px;color:var(--muted);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid.one{grid-template-columns:1fr;}
  .field label{font-size:12px;font-weight:600;color:#4b5063;display:block;margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:#fbfbfd;}
  .field textarea{resize:vertical;min-height:60px;}
  .field{margin-bottom:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;}
  .tab.active{color:var(--accent);border-color:var(--accent);}

  .timeline-item{border-left:2px solid var(--line);padding:2px 0 14px 16px;position:relative;margin-left:4px;}
  .timeline-item::before{content:'';position:absolute;left:-5px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .timeline-item .t-date{font-size:11px;color:var(--muted);}
  .timeline-item .t-body{font-size:13px;margin-top:2px;}

  .lead-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .lead-header .name{font-size:19px;font-weight:700;}
  .lead-header .company{color:var(--muted);font-size:13px;}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--ink);display:inline-flex;gap:6px;align-items:center;}
  .icon-btn.call{color:#047857;border-color:#a7f3d0;background:#ecfdf5;}
  .icon-btn.wa{color:#15803d;border-color:#bbf7d0;background:#f0fdf4;}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px;}

  .print-area{display:none;}
  @media print{
    body *{visibility:hidden;}
    .print-area,.print-area *{visibility:visible;}
    .print-area{display:block;position:absolute;top:0;left:0;width:100%;padding:30px;}
  }
  .qtable{width:100%;border-collapse:collapse;margin-top:10px;}
  .qtable th,.qtable td{border:1px solid #ddd;padding:8px;font-size:13px;}
  .badge-count{background:var(--accent);color:#fff;font-size:10.5px;border-radius:10px;padding:1px 6px;margin-left:6px;}

  /* Login screen */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px;}
  .login-box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:340px;text-align:center;}
  .login-box .dot{width:14px;height:14px;border-radius:4px;background:var(--accent);display:inline-block;margin-bottom:10px;}
  .login-box h2{font-size:19px;margin-bottom:4px;}
  .login-box p{color:var(--muted);font-size:12.5px;margin-bottom:18px;}
  .login-box input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:10px;}
  .login-box .btn{width:100%;justify-content:center;padding:11px;}
  .login-err{color:var(--hot);font-size:12px;margin-bottom:8px;min-height:14px;}

  /* Loading screen */
  .loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:10px;}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid #dde1ee;border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-wrap div.msg{color:var(--muted);font-size:13px;}
  .sync-warn{position:fixed;bottom:14px;right:14px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;padding:8px 12px;border-radius:9px;z-index:998;max-width:260px;}

  /* Mobile responsive */
  .hamburger{display:none;}
  @media(max-width:880px){
    .app{flex-direction:column;}
    .hamburger{display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--navy);color:#fff;border-radius:8px;border:none;font-size:18px;position:fixed;top:12px;left:12px;z-index:60;}
    .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:59;transform:translateX(-100%);transition:transform .2s;width:230px;}
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay{display:none;}
    .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:58;}
    .main{padding:64px 12px 80px;}
    .topbar{flex-direction:column;align-items:flex-start;gap:10px;}
    .topbar .btn{width:100%;justify-content:center;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .two-col{grid-template-columns:1fr;}
    table{display:block;overflow-x:auto;white-space:nowrap;}
    .modal, .modal.wide{max-width:100%;padding:18px 16px;}
    .form-grid{grid-template-columns:1fr;}
    .toolbar input[type=text]{min-width:0;width:100%;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .kanban{gap:10px;}
    .kcol{min-width:78vw;max-width:78vw;}
    .icon-btn{font-size:12px;padding:8px 10px;}
    .lead-header{flex-direction:column;gap:8px;}
  }

</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------- Storage helpers (Google Sheet backend via Apps Script Web App) ----------
// PASTE your deployed Google Apps Script Web App URL below (see setup instructions).
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9aQN_aJ3Wc583u_ZYsMwdMrhyofQMbyb1U9kvbYszMvRvZjpQEJj7oBh6_Ce1KN_kbw/exec';

let DATA = { leads: [], tasks: [], quotations: [], team: ['Shubham','Telecaller','Digital Marketing Exec'], leadSources: ['Reference','Walk-in','Instagram','Website','Cold Call','Other'], nextId: 1 };
let SYNC_OK = true;
let HAS_LOADED_OK = false; // becomes true only after a confirmed real load — saveData() refuses to run before this, so a failed/blank load can never overwrite real Sheet data.

async function loadData(){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')){
    SYNC_OK = false;
    showSetupBanner();
    return;
  }
  try{
    const res = await fetch(APPS_SCRIPT_URL, {cache:'no-store'});
    const text = await res.text();
    if(text && text.trim()){
      const parsed = JSON.parse(text);
      if(parsed && parsed.error){
        console.error('Backend returned error:', parsed.message);
        SYNC_OK = false;
        showErrorBanner('Data load failed: ' + parsed.message + ' — changes WON\'T be saved until this is fixed, to protect your Sheet data.');
        return; // do not touch DATA — keep whatever was already in memory, and leave HAS_LOADED_OK false
      }
      DATA = parsed;
      HAS_LOADED_OK = true;
    }
  }catch(e){ console.error('load failed', e); SYNC_OK = false; showErrorBanner('Data load failed: ' + e.message + ' — changes WON\'T be saved until this is fixed, to protect your Sheet data.'); return; }
  if(!DATA.team) DATA.team = ['Shubham','Telecaller','Digital Marketing Exec'];
  if(!DATA.leadSources || !DATA.leadSources.length) DATA.leadSources = ['Reference','Walk-in','Instagram','Website','Cold Call','Other'];
  if(!DATA.leads) DATA.leads = [];
  if(!DATA.tasks) DATA.tasks = [];
  if(!DATA.quotations) DATA.quotations = [];
  if(!DATA.nextId) DATA.nextId = 1;
}
let saveTimer=null;
function saveData(){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) return;
  if(!HAS_LOADED_OK){
    console.warn('Save blocked — initial load never succeeded, refusing to risk overwriting Sheet data.');
    showErrorBanner('Save blocked: pehli baar data load nahi ho paaya tha, isliye Sheet ko overwrite hone se rok diya gaya. Page refresh karke dobara try karein.');
    return;
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const res = await fetch(APPS_SCRIPT_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(DATA)
      });
      const result = await res.json().catch(()=>null);
      if(result && result.error){ console.error('save rejected by server:', result.message); showErrorBanner('Save failed: ' + result.message); }
    }catch(e){ console.error('save failed', e); showErrorBanner('Save failed: ' + e.message); }
  }, 400);
}
function showSetupBanner(){
  const banner = document.createElement('div');
  banner.style.cssText='position:fixed;top:0;left:0;right:0;background:#fef2f2;color:#991b1b;padding:10px 16px;font-size:13px;text-align:center;z-index:999;border-bottom:1px solid #fecaca;';
  banner.innerHTML = '⚠️ Google Sheet se connect nahi hua. index.html me APPS_SCRIPT_URL set karein (setup guide dekhen).';
  document.body.prepend(banner);
}
function uid(prefix){ return prefix + '_' + (DATA.nextId++) + '_' + Math.random().toString(36).slice(2,6); }

// ---------- AI Assist (Google Gemini via Apps Script proxy — key never exposed here) ----------
async function callAI(prompt){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) return {error:'Google Sheet backend connect nahi hai.'};
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'ai_generate', prompt})
    });
    const json = await res.json();
    return json;
  }catch(e){ return {error:'AI request fail ho gayi: '+e.message}; }
}

function buildFollowupPrompt(lead){
  const recentCalls = (lead.calls||[]).slice(-3).map(c=>`${c.date}: ${c.outcome||''} — ${c.notes||''}`).join('\n') || 'Koi call log nahi hai';
  const recentMeetings = (lead.meetings||[]).slice(-2).map(m=>`${m.date}: ${m.type||''} — ${m.outcome||m.notes||''}`).join('\n') || 'Koi meeting nahi hui';
  return `Tum ek sales executive ke assistant ho, Magix Animation Institute ke liye (ye ek animation/photography training institute hai).
Neeche ek lead ki details hain. Isse ek chhota, warm, professional WhatsApp follow-up message likho — Hinglish me, natural tone me, 2-3 lines se zyada nahi. Koi generic template jaisa mat lagna, is specific lead ke context ke hisaab se likhna.

Lead Name: ${lead.name}
Company: ${lead.company||'—'}
Current Stage: ${lead.status}
Priority: ${lead.priority}
Notes: ${lead.notes||'—'}

Recent Calls:
${recentCalls}

Recent Meetings:
${recentMeetings}

Sirf WhatsApp message likho, aur kuch mat likho (na intro, na explanation).`;
}

// ---------- Constants ----------
const STAGES = ['New Lead','Contacted','Meeting Scheduled','Proposal Sent','Negotiation','Closed Won','Closed Lost'];

function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function addDaysISO(dateStr, days){
  const d = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Next business day — skips Sunday (Indian retail/business context; Saturday stays a working day).
function nextBusinessDay(fromDateStr){
  let d = addDaysISO(fromDateStr || todayISO(), 1);
  while(new Date(d+'T00:00:00').getDay()===0){ d = addDaysISO(d, 1); }
  return d;
}
// Stage-based auto task generation — when a lead moves into one of these
// stages, a follow-up task is created automatically for the assigned person.
const STAGE_AUTO_TASKS = {
  'Meeting Scheduled': {title:'Meeting ki taiyari karein', daysAhead:0},
  'Proposal Sent': {title:'Proposal follow-up karein', daysAhead:3},
  'Negotiation': {title:'Negotiation follow-up karein', daysAhead:2}
};
function maybeCreateAutoTask(lead, oldStatus, newStatus){
  if(oldStatus===newStatus) return;
  const rule = STAGE_AUTO_TASKS[newStatus];
  if(!rule) return;
  let dueDate = todayISO();
  for(let i=0;i<rule.daysAhead;i++){ dueDate = nextBusinessDay(dueDate); }
  if(rule.daysAhead===0 && new Date(dueDate+'T00:00:00').getDay()===0) dueDate = nextBusinessDay(dueDate);
  DATA.tasks.push({
    id: uid('task'), title: rule.title + ' — ' + lead.name, leadId: lead.id,
    assignedTo: lead.assignedTo || DATA.team[0], priority: lead.priority==='Hot'?'High':lead.priority==='Warm'?'Medium':'Low',
    dueDate, completed:false, cancelled:false, autoGenerated:true
  });
}
function daysDiff(d){ const t=new Date(todayISO()); const dd=new Date(d); return Math.round((dd-t)/86400000); }

// ---------- App State ----------
let state = { tab:'dashboard', leadSearch:'', leadFilterStage:'', openLeadId:null, openTaskModal:false, editingTask:null, openQuoteModal:false, editingQuote:null, quoteForLead:null, printQuote:null, newLeadOpen:false, taskFilter:'mine' };

function render(){
  try{
    document.getElementById('root').innerHTML = App();
    attachEvents();
  }catch(err){
    console.error('Render error:', err);
    showErrorBanner('Render error: ' + err.message);
  }
}
function showErrorBanner(msg){
  const old = document.getElementById('errBanner');
  if(old) old.remove();
  const b = document.createElement('div');
  b.id = 'errBanner';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fff;padding:10px 16px;font-size:12.5px;text-align:center;z-index:9999;';
  b.innerHTML = '⚠️ Ek error aayi hai — is message ka screenshot lekar Claude ko bhejein: <b>' + msg + '</b> <button onclick="this.parentElement.remove()" style="margin-left:10px;background:#fff;color:#7f1d1d;border:none;border-radius:5px;padding:2px 8px;cursor:pointer;">Close</button>';
  document.body.prepend(b);
}
window.onerror = function(msg, url, line, col, error){
  console.error('Global error:', msg, 'at line', line);
  showErrorBanner(msg + ' (line ' + line + ')');
  return false;
};

// ---------- Root App ----------
function App(){
  return `
  <button class="hamburger" id="hamburgerBtn">☰</button>
  <div class="sidebar-overlay"></div>
  <div class="app">
    ${Sidebar()}
    <div class="main">
      ${Topbar()}
      ${renderTab()}
    </div>
  </div>
  ${state.openLeadId ? LeadModal(state.openLeadId) : ''}
  ${state.openTaskModal ? TaskModal() : ''}
  ${state.openQuoteModal ? QuoteModal() : ''}
  ${state.openScheduleMeeting ? ScheduleMeetingModal() : ''}
  ${state.openMeetingDetail ? MeetingDetailModal(state.openMeetingDetail.split('|')[0], state.openMeetingDetail.split('|')[1]) : ''}
  ${state.aiChatOpen ? AIChatModal() : ''}
  <button class="icon-btn" id="floatingAIBtn" data-open-ai-chat="1" style="position:fixed;bottom:22px;right:22px;z-index:70;border-radius:50%;width:54px;height:54px;padding:0;justify-content:center;font-size:22px;background:#7c3aed;color:#fff;border:none;box-shadow:0 4px 14px rgba(124,58,237,.4);">✨</button>
  ${state.printQuote ? PrintArea(state.printQuote) : ''}
  `;
}

function Sidebar(){
  const items = [
    ['dashboard','📊','Dashboard'],
    ['kanban','🗂️','Pipeline'],
    ['leads','👥','Leads'],
    ['meetings','🗓️','Meeting Schedule'],
    ['calendar','📅','Calendar'],
    ['tasks','✅','Tasks'],
    ['quotations','🧾','Quotations'],
    ['team','⚙️','Team'],
  ];
  return `<div class="sidebar">
    <div class="brand"><span class="dot"></span> Magix Sales CRM</div>
    ${items.map(([id,icon,label])=>{
      let badge='';
      if(id==='tasks'){ const cnt = DATA.tasks.filter(t=>!t.completed && !t.cancelled && t.dueDate<=todayISO()).length; if(cnt) badge=`<span class="badge-count">${cnt}</span>`; }

// ---------- Meeting Schedule ----------
const MEETING_COLUMNS = ["Today's Meetings","Tomorrow's Meetings","Upcoming Meetings",'Rescheduled','Completed','Cancelled'];

function allMeetingsList(){
  const out = [];
  let idChanged = false;
  DATA.leads.forEach(l=>{
    (l.meetings||[]).forEach((m,idx)=>{
      if(!m.id){ m.id = 'mtg_' + l.id + '_' + idx + '_' + Math.random().toString(36).slice(2,6); idChanged = true; }
      if(!m.priority) m.priority = 'Medium';
      if(m.status==='Scheduled') m.status = 'Pending'; // migrate legacy label
      out.push({ ...m, status:m.status||'Pending', leadId:l.id, leadName:l.name, company:l.company, contact:l.contact, assignedTo:l.assignedTo });
    });
  });
  if(idChanged) saveData();
  return out;
}

function tomorrowISO(){ const d=new Date(); d.setDate(d.getDate()+1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function meetingColumn(m){
  if(m.status==='Cancelled') return 'Cancelled';
  if(m.status==='Completed') return 'Completed';
  if(m.status==='Rescheduled') return 'Rescheduled';
  // Active (Pending / In Progress) meetings are grouped purely by date —
  // overdue/missed ones fold into Today's Meetings so nothing is lost from view.
  const today = todayISO(), tomorrow = tomorrowISO();
  if(m.date<=today) return "Today's Meetings";
  if(m.date===tomorrow) return "Tomorrow's Meetings";
  return "Upcoming Meetings";
}

function isActiveMeetingStatus(status){ return status!=='Cancelled' && status!=='Completed'; }

function checkSlotConflict(date, time, excludeLeadId){
  if(!date || !time) return null;
  for(const l of DATA.leads){
    for(const m of (l.meetings||[])){
      if(m.date===date && m.time===time && isActiveMeetingStatus(m.status||'Pending') && String(l.id)!==String(excludeLeadId)){
        return l.name;
      }
    }
  }
  return null;
}

function MeetingScheduleView(){
  const all = allMeetingsList();
  const today = todayISO();
  const grouped = {};
  MEETING_COLUMNS.forEach(c=>grouped[c]=[]);
  all.forEach(m=>{ grouped[meetingColumn(m)].push(m); });
  Object.values(grouped).forEach(arr=>arr.sort((a,b)=>(a.date+((a.time)||'99:99')).localeCompare(b.date+((b.time)||'99:99'))));

  const todayCount = grouped["Today's Meetings"].length;
  const completedThisWeek = all.filter(m=>{
    if(m.status!=='Completed') return false;
    const d = new Date(m.date); const now = new Date(today); const diff = (now-d)/86400000;
    return diff>=0 && diff<=7;
  }).length;
  const cancelledCount = grouped['Cancelled'].length;
  const upcomingCount = grouped['Upcoming Meetings'].length + grouped["Tomorrow's Meetings"].length;

  function priorityColor(p){ return p==='High'?'hot':p==='Low'?'cold':'warm'; }
  function typeIcon(t){ return t==='Google Meet'?'🎥':t==='Phone Meeting'?'📞':t==='Site Visit'?'📍':'🏢'; }

  function meetingCard(m){
    const overdue = isActiveMeetingStatus(m.status) && m.date<today;
    return `<div class="kcard" draggable="true" data-meeting-id="${m.id}" data-meeting-lead="${m.leadId}" data-open-meeting="${m.id}|${m.leadId}" style="${overdue?'border-left:3px solid var(--hot);':''}">
      <div class="name">${m.leadName}</div>
      <div class="meta">${m.company||'—'}</div>
      <div class="meta" style="margin-top:4px;">${typeIcon(m.type)} ${m.type||'Meeting'} ${m.time?'· <b>'+m.time+'</b>':''}</div>
      <div class="meta" style="margin-top:4px;${overdue?'color:var(--hot);font-weight:600;':''}">${overdue?'⚠️ Overdue · ':''}${fmtDate(m.date)} · ${m.assignedTo||'—'}</div>
      <div class="meta" style="margin-top:5px;"><span class="pill ${priorityColor(m.priority)}">${m.priority||'Medium'}</span></div>
    </div>`;
  }

  return `
  <div class="grid" style="margin-bottom:16px;">
    <div class="card"><div class="stat-num" style="color:var(--accent)">${todayCount}</div><div class="stat-label">Today's Meetings</div></div>
    <div class="card"><div class="stat-num">${upcomingCount}</div><div class="stat-label">Upcoming (Tom. + Later)</div></div>
    <div class="card"><div class="stat-num" style="color:var(--win)">${completedThisWeek}</div><div class="stat-label">Completed (7 din)</div></div>
    <div class="card"><div class="stat-num" style="color:${cancelledCount?'var(--hot)':'inherit'}">${cancelledCount}</div><div class="stat-label">Cancelled</div></div>
  </div>
  <div class="kanban">
    ${MEETING_COLUMNS.map(col=>`
      <div class="kcol" data-meeting-col="${col}">
        <div class="kcol-head"><span>${col}</span><span>${grouped[col].length}</span></div>
        ${grouped[col].map(meetingCard).join('') || `<div class="empty" style="padding:14px 4px;">Koi meeting nahi</div>`}
      </div>`).join('')}
  </div>
  `;
}

  `;

function PriorityDonut(leads){
  const counts = {Hot:0, Warm:0, Cold:0};
  leads.forEach(l=>{ if(counts[l.priority]!==undefined) counts[l.priority]++; });
  const total = counts.Hot+counts.Warm+counts.Cold;
  if(!total) return `<div class="empty">No leads yet</div>`;
  const colors = {Hot:'#ef4444', Warm:'#f59e0b', Cold:'#3b82f6'};
  const order = ['Hot','Warm','Cold'];
  let cumPct = 0;
  const R = 40, C = 2*Math.PI*R;
  const segs = order.map(k=>{
    const pct = counts[k]/total;
    const dash = pct*C;
    const seg = `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${colors[k]}" stroke-width="16" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-cumPct*C}" transform="rotate(-90 60 60)"/>`;
    cumPct += pct;
    return seg;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
    <svg width="120" height="120" viewBox="0 0 120 120">${segs}<text x="60" y="64" text-anchor="middle" font-size="18" font-weight="700" fill="var(--ink)">${total}</text></svg>
    <div>
      ${order.map(k=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12.5px;"><span style="width:10px;height:10px;border-radius:3px;background:${colors[k]};display:inline-block;"></span>${k} — <b>${counts[k]}</b></div>`).join('')}
    </div>
  </div>`;
}

function SourceBarChart(leads){
  const counts = {};
  leads.forEach(l=>{ const s = l.source||'Not Set'; counts[s] = (counts[s]||0)+1; });
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return `<div class="empty">No leads yet</div>`;
  const max = Math.max(...entries.map(e=>e[1]));
  return entries.map(([src,cnt])=>{
    const w = Math.round((cnt/max)*100);
    return `<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px;"><span>${src}</span><span>${cnt}</span></div><div style="background:#eef0f7;border-radius:6px;height:8px;"><div style="width:${w}%;background:var(--cold);height:8px;border-radius:6px;"></div></div></div>`;
  }).join('');
}

function pillClass(l){
  if(l.status==='Closed Won') return 'won';
  if(l.status==='Closed Lost') return 'lost';
  if(l.priority==='Hot') return 'hot';
  if(l.priority==='Warm') return 'warm';
  return 'cold';
}

// ---------- Calendar ----------
function getAllEvents(showCompleted){
  const raw = [];
  DATA.leads.forEach(l=>{
    const isClosed = l.status==='Closed Won' || l.status==='Closed Lost';
    if(l.nextFollowupDate && (showCompleted || !isClosed)){
      raw.push({date:l.nextFollowupDate, type:'Follow-up', title:l.name, sub:l.status, leadId:l.id, closed:isClosed});
    }
  });
  DATA.tasks.forEach(t=>{
    if(t.cancelled && !showCompleted) return;
    if(t.dueDate && (showCompleted || !t.completed)){
      raw.push({date:t.dueDate, type:'Task', title:t.title, sub:'Assigned: '+(t.assignedTo||'—'), leadId:t.leadId||null, taskId:t.id, completed:t.completed});
    }
  });
  // Merge entries that belong to the same lead on the same day, so a lead
  // never shows twice on one date (e.g. Follow-up + Task combine into one row).
  const merged = {};
  const standalone = [];
  raw.forEach(e=>{
    if(e.leadId){
      const key = e.leadId+'|'+e.date;
      if(!merged[key]) merged[key] = {date:e.date, leadId:e.leadId, title:e.title, types:[], subs:[], closed:e.closed, completed:true};
      merged[key].types.push(e.type);
      merged[key].subs.push(e.sub);
      if(!e.completed) merged[key].completed = false;
    } else {
      standalone.push(e);
    }
  });
  const mergedEvents = Object.values(merged).map(m=>({
    date:m.date, type:[...new Set(m.types)].join(' + '), title:m.title, sub:m.subs[0], leadId:m.leadId, closed:m.closed, completed:m.completed
  }));
  return [...mergedEvents, ...standalone];
}

function eventPillClass(type){
  if(type.includes('Meeting')) return 'cold';
  if(type.includes('Task') && !type.includes('Follow-up')) return 'warm';
  return 'hot';
}

function CalendarView(){
  if(!state.calMonth){ const n = new Date(); state.calMonth = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); }
  if(!state.calSelectedDate) state.calSelectedDate = todayISO();

  const [yr, mo] = state.calMonth.split('-').map(Number);
  const firstOfMonth = new Date(yr, mo-1, 1);
  const startWeekday = firstOfMonth.getDay(); // 0=Sun
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const monthLabel = firstOfMonth.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const today = todayISO();

  const events = getAllEvents(!!state.calShowCompleted);
  const byDate = {};
  events.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });

  const cells = [];
  for(let i=0;i<startWeekday;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const gridHtml = `
    <div class="card" style="padding:14px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">

      </label>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px;">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0;">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
        ${cells.map(d=>{
          if(!d) return `<div style="min-height:70px;"></div>`;
          const dateStr = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dayEvents = byDate[dateStr]||[];
          const isToday = dateStr===today;
          const isSelected = dateStr===state.calSelectedDate;
          return `<div data-cal-day="${dateStr}" style="min-height:70px;border-radius:9px;padding:6px;cursor:pointer;border:1px solid ${isSelected?'var(--accent)':'var(--line)'};background:${isToday?'#eef1ff':'#fff'};">
            <div style="font-size:12px;font-weight:${isToday?'800':'600'};color:${isToday?'var(--accent)':'inherit'};margin-bottom:4px;">${d}</div>
            ${dayEvents.slice(0,2).map(e=>{
              const pc = eventPillClass(e.type);
              const bg = pc==='cold'?'#dbeafe':pc==='warm'?'#fef3c7':'#fee2e2';
              const fg = pc==='cold'?'#1d4ed8':pc==='warm'?'#b45309':'#b91c1c';
              return `<div style="font-size:9.5px;padding:1px 5px;border-radius:5px;margin-bottom:2px;background:${bg};color:${fg};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${e.closed||e.completed?'opacity:.55;text-decoration:line-through;':''}">${e.title}</div>`;
            }).join('')}

          </div>`;

  const selEvents = (byDate[state.calSelectedDate]||[]).sort((a,b)=>a.type.localeCompare(b.type));
  const sideHtml = `
    <div class="card">
      <div class="panel-title">${state.calSelectedDate===today?'Today':fmtDate(state.calSelectedDate)}</div>
      ${selEvents.length? selEvents.map(e=>`

          <span style="color:var(--muted);font-size:11.5px;">${e.sub}</span>
        </div>`).join('') : `<div class="empty">Kuch bhi pending nahi hai is din.</div>`}
    </div>`;

  return `<div class="two-col">${gridHtml}${sideHtml}</div>`;
}

// ---------- Tasks ----------
const TASK_COLUMNS = ['To Do','In Progress','Waiting','Completed','Cancelled'];

// Normalizes every task to have a valid Kanban status while keeping the
// existing `completed`/`cancelled` booleans in sync — this is what Calendar,
// Dashboard alerts, and the sidebar badge already read, so nothing else breaks.
function normalizeTaskStatuses(){
  let changed = false;
  DATA.tasks.forEach(t=>{
    if(!t.status){
      t.status = t.cancelled ? 'Cancelled' : t.completed ? 'Completed' : 'To Do';
      changed = true;
    }
  });
  if(changed) saveData();
}
function taskColumn(t){ return TASK_COLUMNS.includes(t.status) ? t.status : 'To Do'; }
function setTaskStatus(t, status){
  t.status = status;
  t.completed = status==='Completed';
  t.cancelled = status==='Cancelled';
}

function leadPriorityWeight(t){
  if(!t.leadId) return 3; // no linked lead — neutral
  const lead = DATA.leads.find(l=>String(l.id)===String(t.leadId));
  if(!lead) return 3;
  if(lead.priority==='Hot') return 0;
  if(lead.priority==='Warm') return 1;
  if(lead.priority==='Cold') return 2;
  return 3;
}
function taskPriorityWeight(p){ return p==='High'?0:p==='Medium'?1:2; }
function sortTasksSmartly(list){
  return [...list].sort((a,b)=>{
    const lw = leadPriorityWeight(a) - leadPriorityWeight(b);
    if(lw!==0) return lw;
    const pw = taskPriorityWeight(a.priority) - taskPriorityWeight(b.priority);
    if(pw!==0) return pw;
    return (a.dueDate||'9999').localeCompare(b.dueDate||'9999');
  });
}

function TasksView(){
  normalizeTaskStatuses();
  let tasks = DATA.tasks;
  if(state.taskFilter!=='all') tasks = tasks.filter(t=>t.assignedTo===state.taskFilter);
  const today = todayISO();

  const grouped = {};
  TASK_COLUMNS.forEach(c=>grouped[c]=[]);
  tasks.forEach(t=>grouped[taskColumn(t)].push(t));
  TASK_COLUMNS.forEach(c=>{ if(c!=='Completed' && c!=='Cancelled') grouped[c] = sortTasksSmartly(grouped[c]); });

  const colColors = {'To Do':'#94a3b8','In Progress':'#3b82f6','Waiting':'#f59e0b','Completed':'#10b981','Cancelled':'#9ca3af'};

  function taskCard(t){
    const lead = DATA.leads.find(l=>String(l.id)===String(t.leadId));
    const isOverdue = t.status!=='Completed' && t.status!=='Cancelled' && t.dueDate && t.dueDate<today;
    const hotBorder = leadPriorityWeight(t)===0 && t.status!=='Completed' && t.status!=='Cancelled';
    return `<div class="kcard" draggable="true" data-task-id="${t.id}" data-open-task="${t.id}" style="${hotBorder?'border-left:3px solid var(--hot);':isOverdue?'border-left:3px solid #f59e0b;':''}">
      <div class="name">${t.title}</div>
      ${lead? `<div class="meta">${lead.name}${lead.company?' · '+lead.company:''}</div>` : ''}
      <div class="meta" style="margin-top:4px;">👤 ${t.assignedTo||'—'}</div>
      <div class="meta" style="margin-top:4px;${isOverdue?'color:var(--hot);font-weight:600;':''}">${isOverdue?'⚠️ ':''}${fmtDate(t.dueDate)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
        <span class="pill ${t.priority==='High'?'hot':t.priority==='Medium'?'warm':'cold'}">${t.priority}</span>
        ${hotBorder? `<span class="pill hot">HOT</span>` : ''}
      </div>
    </div>`;
  }

  return `
  <div class="toolbar">
    <select id="taskFilterSel">
      <option value="all" ${state.taskFilter==='all'?'selected':''}>All Tasks</option>
      ${DATA.team.map(m=>`<option value="${m}" ${state.taskFilter===m?'selected':''}>Assigned to ${m}</option>`).join('')}
    </select>
  </div>
  <div class="kanban">
    ${TASK_COLUMNS.map(col=>{
      const clr = colColors[col];
      return `<div class="kcol" data-task-col="${col}">
        <div class="kcol-head" style="border-bottom:2px solid ${clr};padding-bottom:8px;margin-bottom:10px;"><span>${col}</span><span style="background:${clr};color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;">${grouped[col].length}</span></div>
        ${grouped[col].map(taskCard).join('') || `<div class="empty" style="padding:14px 4px;">Koi task nahi</div>`}
      </div>`;
    }).join('')}
  </div>
  `;
}

function PrintArea(qid){
  const q = DATA.quotations.find(x=>String(x.id)===String(qid));
  if(!q) return '';
  const subtotal = q.items.reduce((s,i)=>s+i.qty*i.price,0);
  const tax = subtotal * (q.taxPercent||0)/100;
  const total = subtotal+tax;
  setTimeout(()=>{ window.print(); }, 300);
  return `<div class="print-area">
    <h1 style="margin-bottom:2px;">Magix Animation Institute</h1>
    <div style="color:#666;margin-bottom:20px;">Quotation ${q.number} — ${fmtDate(q.date)}</div>
    <div style="margin-bottom:14px;"><b>To:</b> ${q.clientName}</div>
    <table class="qtable">
      <thead><tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
      <tbody>
        ${q.items.map(i=>`<tr><td>${i.desc}</td><td>${i.qty}</td><td>₹${i.price}</td><td>₹${(i.qty*i.price).toFixed(0)}</td></tr>`).join('')}
      </tbody>
    </table>
    <div style="text-align:right;margin-top:10px;">
      <div>Subtotal: ₹${subtotal.toFixed(0)}</div>
      <div>Tax (${q.taxPercent||0}%): ₹${tax.toFixed(0)}</div>
      <div style="font-weight:700;font-size:16px;">Total: ₹${total.toFixed(0)}</div>
    </div>
    ${q.notes? `<div style="margin-top:16px;"><b>Notes:</b> ${q.notes}</div>`:''}
  </div>`;
}

// ---------- Event wiring ----------
function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{ state.tab = el.dataset.nav; render(); });
  document.querySelectorAll('[data-open-lead]').forEach(el=>el.onclick=(e)=>{ e.preventDefault(); state.openLeadId = String(el.dataset.openLead); render(); });
  document.querySelectorAll('[data-close-overlay]').forEach(el=>el.onclick=(e)=>{
    if(e.target!==el) return;
    const type = el.dataset.closeOverlay;
    if(type==='lead') state.openLeadId=null;
    if(type==='leadform'){ state.newLeadOpen=false; state.editingLead=null; }
    if(type==='task'){ state.openTaskModal=false; state.editingTask=null; }
    if(type==='quote'){ state.openQuoteModal=false; state.editingQuote=null; state.quoteForLead=null; }
    if(type==='calllog') state.callLogFor=null;
    if(type==='meetinglog') state.meetingLogFor=null;
    if(type==='schedulemeeting') state.openScheduleMeeting=false;
    if(type==='meetingdetail') state.openMeetingDetail=null;
    if(type==='aichat'){ state.aiChatOpen=false; }
    render();
  });
  document.querySelectorAll('[data-stop]').forEach(el=>el.onclick=(e)=>e.stopPropagation());

  const searchInput = document.getElementById('leadSearchInput');
  if(searchInput){ searchInput.oninput = ()=>{ state.leadSearch = searchInput.value; renderTabOnly(); }; }
  const stageFilter = document.getElementById('leadStageFilter');
  if(stageFilter){ stageFilter.onchange = ()=>{ state.leadFilterStage = stageFilter.value; render(); }; }
  const taskFilterSel = document.getElementById('taskFilterSel');
  if(taskFilterSel){ taskFilterSel.onchange = ()=>{ state.taskFilter = taskFilterSel.value; render(); }; }

  document.querySelectorAll('[data-open-new-lead]').forEach(el=>el.onclick=()=>{ state.editingLead=null; injectOverlay(LeadFormModal(null)); });
  document.querySelectorAll('[data-edit-lead]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.editLead));
    injectOverlay(LeadFormModal(lead));
  });
  document.querySelectorAll('[data-save-lead]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.saveLead;
    const vals = {
      name: val('f_name'), company: val('f_company'), contact: val('f_contact'), whatsapp: val('f_whatsapp'),
      email: val('f_email'), source: val('f_source'), priority: val('f_priority'), assignedTo: val('f_assigned'),
      status: val('f_status'), nextFollowupDate: val('f_followup'), address: val('f_address'), notes: val('f_notes'),
      updatedAt: new Date().toISOString()
    };
    if(!vals.name || !vals.contact){ alert('Client Name aur Contact Number required hai'); return; }
    let leadRef;
    let oldStatus = null;
    if(id){
      leadRef = DATA.leads.find(l=>String(l.id)===String(id));
      oldStatus = leadRef.status;
      Object.assign(leadRef, vals);
    } else {
      leadRef = { id: uid('lead'), ...vals, meetings:[], calls:[], statusLog:[{date:todayISO(),status:vals.status}], lastContactDate:'' };
      DATA.leads.push(leadRef);
    }
    maybeCreateAutoTask(leadRef, oldStatus, vals.status);
    saveData(); removeOverlay(); render();
  });

  document.querySelectorAll('[data-log-call]').forEach(el=>el.onclick=()=>injectOverlay(CallLogModal(el.dataset.logCall)));
  document.querySelectorAll('[data-save-call]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveCall));
    lead.calls = lead.calls||[];
    lead.calls.push({date:todayISO(), createdAt:new Date().toISOString(), outcome:val('cl_outcome'), notes:val('cl_notes')});
    lead.lastContactDate = todayISO();
    if(val('cl_followup')) lead.nextFollowupDate = val('cl_followup');
    lead.updatedAt = new Date().toISOString();
    saveData(); removeOverlay(); render();
  });

  document.querySelectorAll('[data-log-meeting]').forEach(el=>el.onclick=()=>injectOverlay(MeetingLogModal(el.dataset.logMeeting)));
  document.querySelectorAll('[data-save-meeting]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveMeeting));
    lead.meetings = lead.meetings||[];
    lead.meetings.push({date:val('ml_date'), time:val('ml_time'), status:val('ml_status')||'Pending', priority:val('ml_priority')||'Medium', type:val('ml_type'), outcome:val('ml_outcome'), notes:val('ml_notes'), createdAt:new Date().toISOString()});
    if(val('ml_followup')) lead.nextFollowupDate = val('ml_followup');
    lead.updatedAt = new Date().toISOString();
    saveData(); removeOverlay(); render();
  });

  document.querySelectorAll('[data-lead-tab]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(state.openLeadId));
    lead._modalTab = el.dataset.leadTab;
    render();
  });
  document.querySelectorAll('[data-save-stage]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveStage));
    const oldStatus = lead.status;
    const newStatus = document.getElementById('stageSelect').value;
    lead.status = newStatus;
    lead.statusLog = lead.statusLog||[];
    lead.statusLog.push({date:todayISO(), createdAt:new Date().toISOString(), status:newStatus});
    if((newStatus!=='Closed Won' && newStatus!=='Closed Lost') && (!lead.nextFollowupDate || lead.nextFollowupDate<todayISO())){
      lead.nextFollowupDate = nextBusinessDay();
    }
    maybeCreateAutoTask(lead, oldStatus, newStatus);
    lead.updatedAt = new Date().toISOString();
    saveData(); render();
  });

  // Tasks
  document.querySelectorAll('[data-open-new-task]').forEach(el=>el.onclick=()=>{ state.editingTask=null; state.openTaskModal=true; render(); });
  document.querySelectorAll('[data-open-task]').forEach(el=>el.onclick=()=>{ state.editingTask = DATA.tasks.find(t=>String(t.id)===String(el.dataset.openTask)); state.openTaskModal=true; render(); });
  document.querySelectorAll('[data-save-task]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.saveTask;
    const vals = { title: val('t_title'), leadId: val('t_lead'), assignedTo: val('t_assigned'), priority: val('t_priority'), dueDate: val('t_due') };
    if(!vals.title){ alert('Task title required'); return; }
    if(id){ Object.assign(DATA.tasks.find(t=>String(t.id)===String(id)), vals); }
    else { DATA.tasks.push({ id: uid('task'), ...vals, completed:false, cancelled:false, status:'To Do' }); }
    saveData(); state.openTaskModal=false; state.editingTask=null; render();
  });
  document.querySelectorAll('[data-set-task-status]').forEach(el=>el.onclick=()=>{
    const t = DATA.tasks.find(x=>String(x.id)===String(el.dataset.setTaskId));
    setTaskStatus(t, el.dataset.setTaskStatus);
    saveData(); state.openTaskModal=false; state.editingTask=null; render();
  });

  // Task Kanban: drag-and-drop between columns (plain cards, no nested inputs — safe)
  document.querySelectorAll('.kanban .kcard[data-task-id]').forEach(card=>{
    card.addEventListener('dragstart', ()=>{ card.classList.add('dragging'); });
    card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); });
  });
  document.querySelectorAll('[data-task-col]').forEach(col=>{
    col.addEventListener('dragover', (e)=>{ e.preventDefault(); col.classList.add('dragover'); });
    col.addEventListener('dragleave', ()=>col.classList.remove('dragover'));
    col.addEventListener('drop', (e)=>{
      e.preventDefault(); col.classList.remove('dragover');
      const dragging = document.querySelector('.kanban .kcard.dragging[data-task-id]');
      if(!dragging) return;
      const t = DATA.tasks.find(x=>String(x.id)===String(dragging.dataset.taskId));
      setTaskStatus(t, col.dataset.taskCol);
      saveData(); render();
    });
  });

  // Quotes
  document.querySelectorAll('[data-open-new-quote]').forEach(el=>el.onclick=()=>{ state.editingQuote=null; state.quoteForLead=null; state.openQuoteModal=true; render(); });
  document.querySelectorAll('[data-open-new-quote-for]').forEach(el=>el.onclick=()=>{ state.editingQuote=null; state.quoteForLead=el.dataset.openNewQuoteFor; state.openQuoteModal=true; state.openLeadId=null; render(); });

  document.querySelectorAll('[data-open-schedule-meeting]').forEach(el=>el.onclick=()=>{ state.openScheduleMeeting=true; render(); });
  (function(){
    const smDate = document.getElementById('sm_date');
    const smTime = document.getElementById('sm_time');
    const smLead = document.getElementById('sm_lead');
    if(smDate && smTime){
      const checkConflict = ()=>{
        const warn = document.getElementById('sm_conflict_warn');
        const conflictWith = checkSlotConflict(smDate.value, smTime.value, smLead?smLead.value:null);
        if(conflictWith){ warn.style.display='block'; warn.textContent = `⚠️ Is time slot par pehle se "${conflictWith}" ke saath meeting hai — dusra time choose karein.`; }
        else if(warn){ warn.style.display='none'; }
      };
      smDate.onchange = checkConflict; smTime.onchange = checkConflict; if(smLead) smLead.onchange = checkConflict;
    }
  })();
  document.querySelectorAll('[data-save-schedule]').forEach(el=>el.onclick=()=>{
    const leadId = val('sm_lead');
    if(!leadId){ alert('Lead select karna zaroori hai'); return; }
    const lead = DATA.leads.find(l=>String(l.id)===String(leadId));
    lead.meetings = lead.meetings||[];
    lead.meetings.push({date:val('sm_date'), time:val('sm_time'), type:val('sm_type'), status:'Pending', priority:val('sm_priority')||'Medium', outcome:'', notes:val('sm_notes'), createdAt:new Date().toISOString()});
    lead.updatedAt = new Date().toISOString();
    saveData(); state.openScheduleMeeting=false; render();
  });

  // Meeting Kanban: open detail, drag-and-drop, quick actions
  document.querySelectorAll('[data-open-meeting]').forEach(el=>el.onclick=()=>{
    state.openMeetingDetail = el.dataset.openMeeting; render();
  });
  document.querySelectorAll('.kanban .kcard[draggable]').forEach(card=>{
    card.addEventListener('dragstart', ()=>{ card.classList.add('dragging'); });
    card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); });
  });
  document.querySelectorAll('[data-meeting-col]').forEach(col=>{
    col.addEventListener('dragover', (e)=>{ e.preventDefault(); col.classList.add('dragover'); });
    col.addEventListener('dragleave', ()=>col.classList.remove('dragover'));
    col.addEventListener('drop', (e)=>{
      e.preventDefault(); col.classList.remove('dragover');
      const dragging = document.querySelector('.kanban .kcard.dragging');
      if(!dragging) return;
      const leadId = dragging.dataset.meetingLead;
      const meetingId = dragging.dataset.meetingId;
      const lead = DATA.leads.find(l=>String(l.id)===String(leadId));
      const m = (lead.meetings||[]).find(x=>x.id===meetingId);
      const newCol = col.dataset.meetingCol;
      if(newCol==="Today's Meetings"){ m.status='Pending'; m.date=todayISO(); }
      else if(newCol==="Tomorrow's Meetings"){ m.status='Pending'; m.date=tomorrowISO(); }
      else if(newCol==='Upcoming Meetings'){
        m.status='Pending';
        const t = tomorrowISO();
        if(!m.date || m.date<=t){ const d=new Date(); d.setDate(d.getDate()+2); m.date = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
      }
      else { m.status = newCol; }
      lead.updatedAt = new Date().toISOString();
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-mtg-status]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.mtgLead));
    const m = (lead.meetings||[]).find(x=>x.id===el.dataset.mtgId);
    m.status = el.dataset.mtgStatus;
    lead.updatedAt = new Date().toISOString();
    saveData(); state.openMeetingDetail=null; render();
  });
  document.querySelectorAll('[data-save-meeting-detail]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveMeetingLead));
    const m = (lead.meetings||[]).find(x=>x.id===el.dataset.saveMeetingDetail);
    m.date = val('md_date'); m.time = val('md_time'); m.type = val('md_type'); m.priority = val('md_priority');
    m.outcome = val('md_outcome'); m.notes = val('md_notes');
    lead.updatedAt = new Date().toISOString();
    saveData(); state.openMeetingDetail=null; render();
  });
  document.querySelectorAll('[data-delete-meeting]').forEach(el=>el.onclick=()=>{
    if(!confirm('Ye meeting permanently delete ho jayegi. Pakka?')) return;
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.deleteMeetingLead));
    lead.meetings = (lead.meetings||[]).filter(x=>x.id!==el.dataset.deleteMeeting);
    lead.updatedAt = new Date().toISOString();
    saveData(); state.openMeetingDetail=null; render();
  });
  (function(){
    const mdDate = document.getElementById('md_date');
    const mdTime = document.getElementById('md_time');
    if(mdDate && mdTime && state.openMeetingDetail){
      const leadId = state.openMeetingDetail.split('|')[1];
      const checkConflict = ()=>{
        const warn = document.getElementById('md_conflict_warn');
        const conflictWith = checkSlotConflict(mdDate.value, mdTime.value, leadId);
        if(conflictWith){ warn.style.display='block'; warn.textContent = `⚠️ Is time slot par pehle se "${conflictWith}" ke saath meeting hai — dusra time choose karein.`; }
        else if(warn){ warn.style.display='none'; }
      };
      mdDate.onchange = checkConflict; mdTime.onchange = checkConflict;
    }
  })();
  document.querySelectorAll('[data-add-item]').forEach(el=>el.onclick=()=>{
    const q = state.editingQuote || (state.editingQuote = {number:val('q_number'),leadId:val('q_lead'),clientName:val('q_client'),date:val('q_date'),taxPercent:val('q_tax'),items:collectItems(),notes:val('q_notes')});
    q.items = collectItems(); q.items.push({desc:'',qty:1,price:0});
    q.number=val('q_number'); q.leadId=val('q_lead'); q.clientName=val('q_client'); q.date=val('q_date'); q.taxPercent=val('q_tax'); q.notes=val('q_notes');
    render();
  });
  document.querySelectorAll('[data-remove-item]').forEach(el=>el.onclick=()=>{
    const idx = parseInt(el.dataset.removeItem);
    const items = collectItems(); items.splice(idx,1);
    const q = state.editingQuote || {number:val('q_number'),leadId:val('q_lead'),clientName:val('q_client'),date:val('q_date'),taxPercent:val('q_tax'),notes:val('q_notes')};
    q.items = items.length?items:[{desc:'',qty:1,price:0}];
    state.editingQuote = q;
    render();
  });
  document.querySelectorAll('[data-save-quote]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.saveQuote;
    const vals = { number: val('q_number'), leadId: val('q_lead'), clientName: val('q_client'), date: val('q_date'), taxPercent: parseFloat(val('q_tax'))||0, items: collectItems(), notes: val('q_notes') };
    if(!vals.clientName){ alert('Client name required'); return; }
    if(id){ Object.assign(DATA.quotations.find(q=>String(q.id)===String(id)), vals); }
    else { DATA.quotations.push({ id: uid('quote'), ...vals, status:'Draft' }); }
    saveData(); state.openQuoteModal=false; state.editingQuote=null; state.quoteForLead=null; state.tab='quotations'; render();
  });
  document.querySelectorAll('[data-quote-status]').forEach(el=>el.onchange=()=>{
    const q = DATA.quotations.find(x=>String(x.id)===String(el.dataset.quoteStatus));
    q.status = el.value; saveData();
  });
  document.querySelectorAll('[data-print-quote]').forEach(el=>el.onclick=()=>{ state.printQuote = el.dataset.printQuote; render(); setTimeout(()=>{state.printQuote=null;},1000); });
  // Calendar
  document.querySelectorAll('[data-cal-nav]').forEach(el=>el.onclick=()=>{
    const [yr,mo] = state.calMonth.split('-').map(Number);
    const d = new Date(yr, mo-1+parseInt(el.dataset.calNav), 1);
    state.calMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    render();
  });
  document.querySelectorAll('[data-cal-day]').forEach(el=>el.onclick=()=>{ state.calSelectedDate = el.dataset.calDay; render(); });
  const calShowCompleted = document.getElementById('calShowCompleted');
  if(calShowCompleted){ calShowCompleted.onchange = ()=>{ state.calShowCompleted = calShowCompleted.checked; render(); }; }

  // Team
  document.querySelectorAll('[data-add-member]').forEach(el=>el.onclick=()=>{
    const inp = document.getElementById('newMemberInput');
    const name = inp.value.trim();
    if(!name) return;
    if(DATA.team.includes(name)){ alert('Ye member already added hai'); return; }
    DATA.team.push(name); saveData(); render();
  });
  document.querySelectorAll('[data-remove-member]').forEach(el=>el.onclick=()=>{
    const idx = parseInt(el.dataset.removeMember);
    const name = DATA.team[idx];
    if(!confirm(`${name} ko team se remove karein?`)) return;
    DATA.team.splice(idx,1); saveData(); render();
  });
  document.querySelectorAll('[data-add-source]').forEach(el=>el.onclick=()=>{
    const inp = document.getElementById('newSourceInput');
    const name = inp.value.trim();
    if(!name) return;
    if(DATA.leadSources.includes(name)){ alert('Ye source already added hai'); return; }
    DATA.leadSources.push(name); saveData(); render();
  });
  document.querySelectorAll('[data-remove-source]').forEach(el=>el.onclick=()=>{
    const idx = parseInt(el.dataset.removeSource);
    const name = DATA.leadSources[idx];
    if(!confirm(`"${name}" source ko remove karein?`)) return;
    DATA.leadSources.splice(idx,1); saveData(); render();
  });

  document.querySelectorAll('[data-wa-template]').forEach(el=>el.onchange=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.waTemplate));
    const val = el.value;
    if(!val || !lead) { el.value=''; return; }
    const templates = {
      followup: `Namaste ${lead.name}, main Magix Animation Institute se baat kar raha hu. Aapse follow-up karna tha — kya aapne humari services ke baare me soch liya? Koi bhi sawaal ho tho bataiye, khushi se help karenge.`,
      meeting: `Namaste ${lead.name}, aapki meeting confirm ho gayi hai. Time aur venue ki details jald hi bhej denge. Dhanyawad!`,
      quote: `Namaste ${lead.name}, aapki quotation ready hai. Main abhi share karta hu — kripya check karke bataiye.`,
      thanks: `Namaste ${lead.name}, Magix Animation Institute choose karne ke liye dhanyawad! Koi bhi query ho tho hume bataiye, hum hamesha madad ke liye ready hain.`
    };
    const num = String(lead.whatsapp).replace(/\D/g,'');
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(templates[val])}`, '_blank');
    el.value = '';
  });

  // AI Assistant (general-purpose chat)
  document.querySelectorAll('[data-open-ai-chat]').forEach(el=>el.onclick=()=>{
    state.aiChatOpen = true; state.aiChatLeadId = null; state.aiChatError = null;
    render();
  });
  document.querySelectorAll('[data-open-ai-chat-lead]').forEach(el=>el.onclick=()=>{
    const leadId = el.dataset.openAiChatLead;
    state.aiChatOpen = true; state.aiChatLeadId = leadId; state.aiChatError = null;
    if(!state.aiChatMessages || !state.aiChatMessages.length){
      const lead = DATA.leads.find(l=>String(l.id)===String(leadId));
      state.aiChatDraft = `Isko ek follow-up WhatsApp message likh do — ${lead.name}, current stage: ${lead.status}.`;
    }
    render();
  });
  async function sendAIChat(){
    const ta = document.getElementById('ai_chat_input');
    const input = (ta ? ta.value : state.aiChatDraft || '').trim();
    if(!input) return;
    state.aiChatMessages = state.aiChatMessages || [];
    state.aiChatMessages.push({role:'user', text:input});
    state.aiChatDraft = '';
    state.aiChatLoading = true; state.aiChatError = null;
    render();
    const lead = state.aiChatLeadId ? DATA.leads.find(l=>String(l.id)===String(state.aiChatLeadId)) : null;
    let fullPrompt = '';
    if(lead){
      fullPrompt += `Context — Lead: ${lead.name}, Company: ${lead.company||'—'}, Stage: ${lead.status}, Priority: ${lead.priority}, Notes: ${lead.notes||'—'}.\n\n`;
    }
    if(state.aiChatMessages.length>1){
      fullPrompt += 'Pichli conversation:\n' + state.aiChatMessages.slice(0,-1).map(m=>`${m.role==='user'?'User':'Assistant'}: ${m.text}`).join('\n') + '\n\n';
    }
    fullPrompt += `User ka naya message: ${input}\n\nTum Magix Animation Institute ke sales assistant ho. Hinglish me, concise aur practical jawab do — jo bhi user ne manga hai (message likhna ho, summary, ya koi bhi sawaal) wahi karo, seedha jawab do, extra intro/explanation mat do.`;
    const result = await callAI(fullPrompt);
    state.aiChatLoading = false;
    if(result.error){ state.aiChatError = (typeof result.error === 'string' ? result.error : result.message) || 'AI request fail ho gayi.'; }
    else { state.aiChatMessages.push({role:'model', text:(result.text||'').trim()}); }
    render();
    const hist = document.getElementById('ai_chat_history');
    if(hist) hist.scrollTop = hist.scrollHeight;
  }
  document.querySelectorAll('[data-ai-send]').forEach(el=>el.onclick=sendAIChat);
  const aiChatInputEl = document.getElementById('ai_chat_input');
  if(aiChatInputEl){
    aiChatInputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendAIChat(); } });
    aiChatInputEl.addEventListener('input', ()=>{ state.aiChatDraft = aiChatInputEl.value; });
  }
  document.querySelectorAll('[data-ai-clear]').forEach(el=>el.onclick=()=>{
    state.aiChatMessages = []; state.aiChatError = null; render();
  });
  document.querySelectorAll('[data-send-ai-whatsapp]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.sendAiWhatsapp));
    const lastModelMsg = [...(state.aiChatMessages||[])].reverse().find(m=>m.role==='model');
    if(!lastModelMsg) return;
    const num = String(lead.whatsapp).replace(/\D/g,'');
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(lastModelMsg.text)}`, '_blank');
  });

  document.querySelectorAll('[data-pipeline-stage]').forEach(el=>el.onclick=()=>{
    state.leadFilterStage = el.dataset.pipelineStage; state.tab='leads'; render();
  });

  // Mobile hamburger
  const hamb = document.getElementById('hamburgerBtn');
  if(hamb){ hamb.onclick = ()=>{ document.querySelector('.sidebar').classList.add('open'); document.querySelector('.sidebar-overlay').classList.add('show'); }; }
  const overlay = document.querySelector('.sidebar-overlay');
  if(overlay){ overlay.onclick = ()=>{ document.querySelector('.sidebar').classList.remove('open'); overlay.classList.remove('show'); }; }
  document.querySelectorAll('.nav-item').forEach(el=>{
    const existing = el.onclick;
    el.onclick = (e)=>{ if(existing) existing(e); const sb=document.querySelector('.sidebar'); const ov=document.querySelector('.sidebar-overlay'); if(sb) sb.classList.remove('open'); if(ov) ov.classList.remove('show'); };
  });

  // Delete lead / task / quotation
  document.querySelectorAll('[data-delete-lead]').forEach(el=>el.onclick=()=>{
    if(!confirm('Ye lead permanently delete ho jayega. Pakka?')) return;
    DATA.leads = DATA.leads.filter(l=>l.id!==el.dataset.deleteLead);
    saveData(); state.openLeadId=null; render();
  });
  document.querySelectorAll('[data-delete-task]').forEach(el=>el.onclick=()=>{
    if(!confirm('Ye task delete ho jayega. Pakka?')) return;
    DATA.tasks = DATA.tasks.filter(t=>String(t.id)!==String(el.dataset.deleteTask));
    saveData(); state.openTaskModal=false; state.editingTask=null; render();
  });
  document.querySelectorAll('[data-delete-quote]').forEach(el=>el.onclick=()=>{
    if(!confirm('Ye quotation delete ho jayega. Pakka?')) return;
    DATA.quotations = DATA.quotations.filter(q=>q.id!==el.dataset.deleteQuote);
    saveData(); render();
  });

  document.querySelectorAll('[data-wa-quote]').forEach(el=>el.onclick=()=>{
    const q = DATA.quotations.find(x=>String(x.id)===String(el.dataset.waQuote));
    const total = q.items.reduce((s,i)=>s+i.qty*i.price,0)*(1+(q.taxPercent||0)/100);
    const lead = DATA.leads.find(l=>String(l.id)===String(q.leadId));
    const num = lead?.whatsapp ? String(lead.whatsapp).replace(/\D/g,'') : '';
    const text = encodeURIComponent(`Namaste ${q.clientName}, aapki quotation ${q.number} ready hai. Total: ₹${total.toFixed(0)}. Details ke liye reply karein.`);
    window.open(`https://wa.me/${num}?text=${text}`, '_blank');
  });
}

function collectItems(){
  const rows = document.querySelectorAll('[data-item-row]');
  const items = [];
  rows.forEach(r=>{
    items.push({
      desc: r.querySelector('.qi_desc').value,
      qty: parseFloat(r.querySelector('.qi_qty').value)||0,
      price: parseFloat(r.querySelector('.qi_price').value)||0
    });
  });
  return items;
}
function val(id){ const el = document.getElementById(id); return el?el.value:''; }

function renderTabOnly(){
  // lightweight re-render of just the tab body to keep search input focused
  const mainEls = document.querySelectorAll('.main');
  if(mainEls.length){ /* fallback to full render for simplicity */ }
  render();
  const s = document.getElementById('leadSearchInput');
  if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
}

// Overlay injection helpers for modals not part of main render tree
function injectOverlay(html){
  const wrap = document.createElement('div');
  wrap.id = 'floatingOverlay';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  wireOverlay(wrap);
}
function removeOverlay(){ const w = document.getElementById('floatingOverlay'); if(w) w.remove(); }
function wireOverlay(root){
  root.querySelectorAll('[data-close-overlay]').forEach(el=>el.onclick=(e)=>{ if(e.target===el) removeOverlay(); });
  root.querySelectorAll('[data-stop]').forEach(el=>el.onclick=(e)=>e.stopPropagation());
  root.querySelectorAll('.close-x').forEach(el=>el.onclick=()=>removeOverlay());
  const mlDate = root.querySelector('#ml_date'), mlTime = root.querySelector('#ml_time'), mlLeadIdBtn = root.querySelector('[data-save-meeting]');
  if(mlDate && mlTime){
    const checkFn = ()=>{
      const warn = root.querySelector('#ml_conflict_warn');
      const conflictWith = checkSlotConflict(mlDate.value, mlTime.value, mlLeadIdBtn?mlLeadIdBtn.dataset.saveMeeting:null);
      if(conflictWith){ warn.style.display='block'; warn.textContent = `⚠️ Is time slot pe pehle se ek meeting hai: ${conflictWith}. Dusra time choose karein.`; }
      else { warn.style.display='none'; }
    };
    mlDate.onchange = checkFn; mlTime.onchange = checkFn;
  }
  root.querySelectorAll('[data-save-lead]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.saveLead;
    const vals = {
      name: rval(root,'f_name'), company: rval(root,'f_company'), contact: rval(root,'f_contact'), whatsapp: rval(root,'f_whatsapp'),
      email: rval(root,'f_email'), source: rval(root,'f_source'), priority: rval(root,'f_priority'), assignedTo: rval(root,'f_assigned'),
      status: rval(root,'f_status'), nextFollowupDate: rval(root,'f_followup'), address: rval(root,'f_address'), notes: rval(root,'f_notes'),
      updatedAt: new Date().toISOString()
    };
    if(!vals.name || !vals.contact){ alert('Client Name aur Contact Number required hai'); return; }
    let leadRef2; let oldStatus2 = null;
    if(id){ leadRef2 = DATA.leads.find(l=>String(l.id)===String(id)); oldStatus2 = leadRef2.status; Object.assign(leadRef2, vals); }
    else { leadRef2 = { id: uid('lead'), ...vals, meetings:[], calls:[], statusLog:[{date:todayISO(),status:vals.status}], lastContactDate:'' }; DATA.leads.push(leadRef2); }
    maybeCreateAutoTask(leadRef2, oldStatus2, vals.status);
    saveData(); removeOverlay(); render();
  });
  root.querySelectorAll('[data-save-call]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveCall));
    lead.calls = lead.calls||[];
    lead.calls.push({date:todayISO(), createdAt:new Date().toISOString(), outcome:rval(root,'cl_outcome'), notes:rval(root,'cl_notes')});
    lead.lastContactDate = todayISO();
    if(rval(root,'cl_followup')) lead.nextFollowupDate = rval(root,'cl_followup');
    lead.updatedAt = new Date().toISOString();
    saveData(); removeOverlay(); render();
  });
  root.querySelectorAll('[data-save-meeting]').forEach(el=>el.onclick=()=>{
    const lead = DATA.leads.find(l=>String(l.id)===String(el.dataset.saveMeeting));
    lead.meetings = lead.meetings||[];
    lead.meetings.push({date:rval(root,'ml_date'), time:rval(root,'ml_time'), status:rval(root,'ml_status')||'Pending', priority:rval(root,'ml_priority')||'Medium', type:rval(root,'ml_type'), outcome:rval(root,'ml_outcome'), notes:rval(root,'ml_notes'), createdAt:new Date().toISOString()});
    if(rval(root,'ml_followup')) lead.nextFollowupDate = rval(root,'ml_followup');
    lead.updatedAt = new Date().toISOString();
    saveData(); removeOverlay(); render();
  });
}
function rval(root,id){ const el = root.querySelector('#'+id); return el?el.value:''; }

// ---------- Login gate (basic protection — not enterprise security) ----------
// Password change karne ke liye yahan naya password likh do.
const CRM_PASSWORD = 'magix2026';

function showLogin(){
  document.getElementById('root').innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <span class="dot"></span>
        <h2>Magix Sales CRM</h2>
        <p>Team password daalke enter karein</p>
        <div class="login-err" id="loginErr"></div>
        <input type="password" id="loginPass" placeholder="Password" autofocus>
        <button class="btn" id="loginBtn">Login</button>
      </div>
    </div>`;
  document.getElementById('loginBtn').onclick = tryLogin;
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
}
function tryLogin(){
  const val = document.getElementById('loginPass').value;
  if(val === CRM_PASSWORD){
    sessionStorage.setItem('magix_crm_auth','1');
    boot();
  } else {
    document.getElementById('loginErr').textContent = 'Galat password. Dobara try karein.';
  }
}
function showLoading(){
  document.getElementById('root').innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="msg">CRM load ho raha hai…</div>
    </div>`;
}

// ---------- Boot ----------
async function boot(){
  showLoading();
  await loadData();
  render();
  if(!SYNC_OK){
    const warn = document.createElement('div');
    warn.className = 'sync-warn';
    warn.textContent = '⚠️ Google Sheet se connect nahi ho paaya. Data save nahi hoga — internet check karein ya setup guide dekhein.';
    document.body.appendChild(warn);
  }
}
(function(){
  if(sessionStorage.getItem('magix_crm_auth')==='1'){ boot(); }
  else { showLogin(); }
})();
</script>
