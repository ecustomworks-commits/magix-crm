<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magix Sales CRM</title>
<style>
  :root{
    --navy:#0f172a;
    --navy-2:#1e293b;
    --panel:#ffffff;
    --bg:#f8fafc;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#e2e8f0;
    --accent:#3b82f6;
    --accent-soft:#eff6ff;
    --accent-hover:#2563eb;
    --hot:#ef4444;
    --warm:#f59e0b;
    --cold:#3b82f6;
    --win:#10b981;
    --lost:#94a3b8;
    --radius:12px;
    --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg:0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{margin:0;font-family:'Inter','Segoe UI',system-ui,sans-serif;letter-spacing:-0.02em;}
  button{font-family:inherit;cursor:pointer;transition:all .15s ease;}
  input,select,textarea{font-family:inherit;transition:border-color .15s,box-shadow .15s;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}

  .app{display:flex;min-height:100vh;}
  .sidebar{width:240px;background:var(--navy);color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;padding:20px 14px;position:relative;}
  .brand{color:#fff;font-weight:800;font-size:18px;padding:8px 12px 24px;display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block;box-shadow:0 0 8px rgba(59,130,246,0.5);}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:13.5px;color:#94a3b8;margin-bottom:3px;transition:all .15s;cursor:pointer;position:relative;}
  .nav-item:hover{background:#1e293b;color:#f1f5f9;}
  .nav-item.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.3);}
  .nav-icon{width:20px;text-align:center;font-size:15px;}
  .sidebar-foot{margin-top:auto;font-size:11px;color:#475569;padding:12px;border-top:1px solid #1e293b;}
  .sidebar-version{font-size:10px;color:#334155;margin-top:4px;}

  .main{flex:1;min-width:0;padding:24px 32px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .topbar h1{font-size:24px;font-weight:800;}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .btn{border:none;background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--shadow-sm);}
  .btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none;}
  .btn.secondary:hover{background:#f8fafc;border-color:#cbd5e1;}
  .btn.ghost{background:transparent;color:var(--accent);padding:6px 10px;box-shadow:none;}
  .btn.ghost:hover{background:var(--accent-soft);}
  .btn.small{padding:7px 12px;font-size:12.5px;}
  .btn.danger{background:#fef2f2;color:var(--hot);border:1px solid #fecaca;box-shadow:none;}
  .btn.danger:hover{background:#fee2e2;border-color:#fca5a5;}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);transition:all .15s;}
  .card.clickable-card{cursor:pointer;}
  .card.clickable-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px);}
  .stat-num{font-size:28px;font-weight:800;letter-spacing:-0.02em;}
  .stat-label{font-size:13px;color:var(--muted);margin-top:4px;font-weight:500;}
  .panel-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}

  .list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .list-row:last-child{border-bottom:none;}
  .pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .pill.hot{background:#fef2f2;color:#dc2626;}
  .pill.warm{background:#fffbeb;color:#d97706;}
  .pill.cold{background:#eff6ff;color:#2563eb;}
  .pill.won{background:#ecfdf5;color:#059669;}
  .pill.lost{background:#f1f5f9;color:#64748b;}

  .alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px 16px;font-size:13px;color:#9a3412;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-sm);}
  .alert.danger{background:#fef2f2;border-color:#fecaca;color:#991b1b;}
  .alert.success{background:#ecfdf5;border-color:#a7f3d0;color:#065f46;}
  .alert.info{background:#eff6ff;border-color:#bfdbfe;color:#1e40af;}

  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;}
  .kcol{background:#f1f5f9;border-radius:14px;min-width:260px;max-width:260px;padding:12px;flex-shrink:0;transition:all .15s;}
  .kcol-head{font-size:13px;font-weight:700;color:#475569;display:flex;justify-content:space-between;margin-bottom:10px;padding:0 4px;}
  .kcard{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;border:1px solid var(--line);transition:all .15s;}
  .kcard[draggable="true"]{cursor:grab;}
  .kcard[draggable="true"]:active{cursor:grabbing;}
  .kcard.dragging{opacity:.5;transform:rotate(2deg);}
  .kcard:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px);}
  .kcard .name{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--ink);}
  .kcard .meta{font-size:12px;color:var(--muted);line-height:1.4;}
  .kcol.dragover{outline:2px dashed var(--accent);outline-offset:-4px;background:#eff6ff;}

  table{width:100%;border-collapse:separate;border-spacing:0;background:var(--panel);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);background:#f8fafc;font-weight:700;letter-spacing:0.05em;}
  td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  tr.clickable:hover{background:#f8fafc;cursor:pointer;}
  tr.clickable{transition:background .1s;}

  .toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .toolbar input,.toolbar select{padding:9px 13px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff;}
  .toolbar input[type=text]{min-width:260px;}

  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;z-index:100;backdrop-filter:blur(4px);animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:660px;padding:28px 30px;margin-bottom:40px;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .modal.wide{max-width:860px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-head h2{font-size:20px;font-weight:800;}
  .close-x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:4px;border-radius:8px;transition:all .15s;}
  .close-x:hover{background:#f1f5f9;color:var(--ink);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid.one{grid-template-columns:1fr;}
  .field label{font-size:12.5px;font-weight:700;color:#475569;display:block;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#f8fafc;}
  .field textarea{resize:vertical;min-height:70px;}
  .field{margin-bottom:14px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .tab{padding:10px 16px;font-size:13.5px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;border-radius:6px 6px 0 0;}
  .tab:hover{background:#f8fafc;color:#334155;}
  .tab.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}

  .timeline-item{border-left:2px solid var(--line);padding:2px 0 16px 18px;position:relative;margin-left:6px;}
  .timeline-item::before{content:'';position:absolute;left:-5px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .timeline-item .t-date{font-size:11.5px;color:var(--muted);font-weight:500;}
  .timeline-item .t-body{font-size:13.5px;margin-top:3px;line-height:1.5;}

  .lead-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .lead-header .name{font-size:20px;font-weight:800;}
  .lead-header .company{color:var(--muted);font-size:13.5px;margin-top:4px;}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink);display:inline-flex;gap:7px;align-items:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
  .icon-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
  .icon-btn.call{color:#047857;border-color:#a7f3d0;background:#ecfdf5;}
  .icon-btn.call:hover{background:#d1fae5;}
  .icon-btn.wa{color:#15803d;border-color:#bbf7d0;background:#f0fdf4;}
  .icon-btn.wa:hover{background:#dcfce7;}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 16px;font-weight:500;}

  .print-area{display:none;}
  @media print{
    body *{visibility:hidden;}
    .print-area,.print-area *{visibility:visible;}
    .print-area{display:block;position:absolute;top:0;left:0;width:100%;padding:30px;}
  }
  .qtable{width:100%;border-collapse:collapse;margin-top:12px;}
  .qtable th,.qtable td{border:1px solid #ddd;padding:10px;font-size:13.5px;}
  .badge-count{background:var(--accent);color:#fff;font-size:10.5px;border-radius:10px;padding:2px 7px;margin-left:6px;font-weight:700;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px;}
  .login-box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;text-align:center;box-shadow:var(--shadow-lg);}
  .login-box .dot{width:14px;height:14px;border-radius:4px;background:var(--accent);display:inline-block;margin-bottom:12px;box-shadow:0 0 12px rgba(59,130,246,0.4);}
  .login-box h2{font-size:20px;margin-bottom:6px;font-weight:800;}
  .login-box p{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .login-box input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;font-size:15px;margin-bottom:12px;background:#f8fafc;}
  .login-box .btn{width:100%;justify-content:center;padding:13px;font-size:15px;}
  .login-err{color:var(--hot);font-size:13px;margin-bottom:10px;min-height:16px;font-weight:600;}

  .loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:14px;}
  .spinner{width:40px;height:40px;border-radius:50%;border:3.5px solid #e2e8f0;border-top-color:var(--accent);animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-wrap div.msg{color:var(--muted);font-size:14px;font-weight:500;}
  .sync-warn{position:fixed;bottom:16px;right:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12.5px;padding:10px 14px;border-radius:10px;z-index:998;max-width:280px;box-shadow:var(--shadow);}
  .sync-ok{position:fixed;bottom:16px;right:16px;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;font-size:12.5px;padding:10px 14px;border-radius:10px;z-index:998;box-shadow:var(--shadow);}

  .offline-bar{position:fixed;top:0;left:0;right:0;background:#fef2f2;color:#991b1b;padding:10px 16px;font-size:13px;text-align:center;z-index:999;font-weight:600;display:none;}
  .offline-bar.show{display:block;}

  .toast-container{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
  .toast{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:280px;max-width:400px;animation:toastIn .3s ease;transform-origin:top right;}
  @keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(0.95);}to{opacity:1;transform:translateX(0) scale(1);}}
  .toast.success{border-left:4px solid #10b981;}
  .toast.error{border-left:4px solid #ef4444;}
  .toast.info{border-left:4px solid #3b82f6;}
  .toast-close{background:none;border:none;font-size:16px;color:#94a3b8;cursor:pointer;margin-left:auto;padding:2px;}

  .hamburger{display:none;}
  @media(max-width:880px){
    .app{flex-direction:column;}
    .hamburger{display:flex;align-items:center;justify-content:center;width:42px;height:42px;background:var(--navy);color:#fff;border-radius:10px;border:none;font-size:20px;position:fixed;top:14px;left:14px;z-index:60;box-shadow:var(--shadow);}
    .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:59;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);width:250px;box-shadow:var(--shadow-lg);}
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay{display:none;}
    .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:58;backdrop-filter:blur(2px);}
    .main{padding:68px 16px 80px;}
    .topbar{flex-direction:column;align-items:flex-start;gap:12px;}
    .topbar .btn{width:100%;justify-content:center;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .two-col{grid-template-columns:1fr;}
    table{display:block;overflow-x:auto;white-space:nowrap;}
    .modal, .modal.wide{max-width:100%;padding:20px 18px;}
    .form-grid{grid-template-columns:1fr;}
    .toolbar input[type=text]{min-width:0;width:100%;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .kanban{gap:12px;}
    .kcol{min-width:82vw;max-width:82vw;}
    .icon-btn{font-size:12px;padding:8px 12px;}
    .lead-header{flex-direction:column;gap:10px;}
  }

  .export-btn{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
  .export-btn:hover{background:#dcfce7;}
</style>

<body>
<div class="offline-bar" id="offlineBar">📡 You are offline. Changes will sync when connection is restored.</div>
<div class="toast-container" id="toastContainer"></div>
<div id="root"></div>

<script>
// ================================================================
// CONFIGURATION
// ================================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9aQN_aJ3Wc583u_ZYsMwdMrhyofQMbyb1U9kvbYszMvRvZjpQEJj7oBh6_Ce1KN_kbw/exec';

// ================================================================
// OFFLINE-FIRST STORAGE (IndexedDB)
// ================================================================
const DB_NAME = 'MagixCRM';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      d.createObjectStore('data', { keyPath: 'key' });
      d.createObjectStore('syncQueue', { keyPath: 'id', autoIncrement: true });
    };
  });
}

async function dbGet(key) {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('data', 'readonly');
    const store = tx.objectStore('data');
    const req = store.get(key);
    req.onsuccess = () => resolve(req.result?.value);
    req.onerror = () => reject(req.error);
  });
}

async function dbSet(key, value) {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('data', 'readwrite');
    const store = tx.objectStore('data');
    const req = store.put({ key, value, timestamp: Date.now() });
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbQueueChange(change) {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('syncQueue', 'readwrite');
    const store = tx.objectStore('syncQueue');
    const req = store.add({ ...change, timestamp: Date.now() });
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbGetQueue() {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('syncQueue', 'readonly');
    const store = tx.objectStore('syncQueue');
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbClearQueue() {
  if (!db) await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('syncQueue', 'readwrite');
    const store = tx.objectStore('syncQueue');
    const req = store.clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ================================================================
// NETWORK STATUS
// ================================================================
let IS_ONLINE = navigator.onLine;
window.addEventListener('online', () => { IS_ONLINE = true; updateOfflineBar(); showToast('Connection restored. Syncing changes...', 'success'); processSyncQueue(); });
window.addEventListener('offline', () => { IS_ONLINE = false; updateOfflineBar(); showToast('You are offline. Changes saved locally.', 'info'); });

function updateOfflineBar() {
  const bar = document.getElementById('offlineBar');
  if (bar) bar.classList.toggle('show', !IS_ONLINE);
}

// ================================================================
// TOAST NOTIFICATIONS
// ================================================================
function showToast(message, type = 'info', duration = 4000) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  toast.innerHTML = `<span style="font-size:16px;">${icons[type] || 'ℹ'}</span><span style="font-size:13px;font-weight:500;">${message}</span><button class="toast-close">×</button>`;
  container.appendChild(toast);
  toast.querySelector('.toast-close').onclick = () => toast.remove();
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
}

// ================================================================
// DATA MANAGEMENT
// ================================================================
let DATA = { leads: [], tasks: [], quotations: [], team: ['Shubham','Telecaller','Digital Marketing Exec'], leadSources: ['Reference','Walk-in','Instagram','Website','Cold Call','Other'], nextId: 1 };
let SYNC_OK = true;
let LAST_SYNC = null;

async function loadData() {
  const cached = await dbGet('crmData').catch(() => null);
  if (cached) {
    DATA = cached;
    SYNC_OK = false;
    showToast('Loaded from cache. Syncing with server...', 'info', 3000);
  }

  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    SYNC_OK = false;
    showSetupBanner();
    return;
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text && text.trim()) {
      const parsed = JSON.parse(text);
      DATA = parsed;
      await dbSet('crmData', DATA);
      LAST_SYNC = new Date().toISOString();
      SYNC_OK = true;
      showToast('Data synced successfully', 'success', 2000);
    }
  } catch (e) {
    console.error('load failed', e);
    SYNC_OK = false;
    if (!cached) showToast('Failed to load data. Working offline mode.', 'error', 5000);
  }

  if (!DATA.team) DATA.team = ['Shubham','Telecaller','Digital Marketing Exec'];
  if (!DATA.leadSources || !DATA.leadSources.length) DATA.leadSources = ['Reference','Walk-in','Instagram','Website','Cold Call','Other'];
  if (!DATA.leads) DATA.leads = [];
  if (!DATA.tasks) DATA.tasks = [];
  if (!DATA.quotations) DATA.quotations = [];
  if (!DATA.nextId) DATA.nextId = 1;
}

let saveTimer = null;
function saveData() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!IS_ONLINE) {
      await dbQueueChange({ type: 'save', data: JSON.parse(JSON.stringify(DATA)) });
      showToast('Changes saved locally (offline)', 'info', 3000);
      return;
    }
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(DATA)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      if (result.error) throw new Error(result.message);
      SYNC_OK = true;
      await dbSet('crmData', DATA);
      LAST_SYNC = new Date().toISOString();
    } catch (e) {
      console.error('save failed', e);
      SYNC_OK = false;
      await dbQueueChange({ type: 'save', data: JSON.parse(JSON.stringify(DATA)) });
      showToast('Save failed — changes queued for sync', 'error', 4000);
    }
  }, 400);
}

async function processSyncQueue() {
  const queue = await dbGetQueue().catch(() => []);
  if (!queue.length) return;
  showToast(`Syncing ${queue.length} queued changes...`, 'info', 3000);
  try {
    const latest = queue[queue.length - 1];
    if (latest.type === 'save') {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(latest.data)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      if (result.error) throw new Error(result.message);
    }
    await dbClearQueue();
    SYNC_OK = true;
    showToast('All changes synced!', 'success', 3000);
    await loadData();
    render();
  } catch (e) {
    showToast('Sync failed: ' + e.message, 'error', 5000);
  }
}

async function exportData(format) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    showToast('Export nahi ho sakta — backend connect nahi hai', 'error');
    return;
  }
  try {
    showToast('Export prepare ho raha hai...', 'info', 3000);
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'export', format })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.message);
    if (format === 'csv') {
      const blob = new Blob([json.data], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = json.filename;
      link.click();
    } else {
      const blob = new Blob([JSON.stringify(json.data, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = json.filename;
      link.click();
    }
    showToast('Export successful!', 'success');
  } catch (e) {
    showToast('Export failed: ' + e.message, 'error');
  }
}

const STAGES = ['New Lead','Contacted','Meeting Scheduled','Proposal Sent','Negotiation','Closed Won','Closed Lost'];

function todayISO() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function addDaysISO(dateStr, days) {
  const d = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function nextBusinessDay(fromDateStr) {
  let d = addDaysISO(fromDateStr || todayISO(), 1);
  while(new Date(d+'T00:00:00').getDay()===0){ d = addDaysISO(d, 1); }
  return d;
}

const STAGE_AUTO_TASKS = {
  'Meeting Scheduled': {title:'Meeting ki taiyari karein', daysAhead:0},
  'Proposal Sent': {title:'Proposal follow-up karein', daysAhead:3},
  'Negotiation': {title:'Negotiation follow-up karein', daysAhead:2}
};
function maybeCreateAutoTask(lead, oldStatus, newStatus) {
  if(oldStatus===newStatus) return;
  const rule = STAGE_AUTO_TASKS[newStatus];
  if(!rule) return;
  let dueDate = todayISO();
  for(let i=0;i<rule.daysAhead;i++){ dueDate = nextBusinessDay(dueDate); }
  if(rule.daysAhead===0 && new Date(dueDate+'T00:00:00').getDay()===0) dueDate = nextBusinessDay(dueDate);
  DATA.tasks.push({
    id: uid('task'), title: rule.title + ' — ' + lead.name, leadId: lead.id,
    assignedTo: lead.assignedTo || DATA.team[0], priority: lead.priority==='Hot'?'High':lead.priority==='Warm'?'Medium':'Low',
    dueDate, completed:false, cancelled:false, autoGenerated:true, status:'To Do'
  });
}
function daysDiff(d) { const t=new Date(todayISO()); const dd=new Date(d); return Math.round((dd-t)/86400000); }
